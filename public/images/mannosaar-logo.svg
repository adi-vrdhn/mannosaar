<svg viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Brain Icon -->
  <g id="brain">
    <path d="M 400 150 Q 380 170 380 200 Q 380 230 400 250 Q 420 230 420 200 Q 420 170 400 150" fill="#2C3E7F" stroke="#2C3E7F" stroke-width="8"/>
    <path d="M 350 200 Q 330 220 330 250 Q 330 280 350 300 Q 370 280 370 250 Q 370 220 350 200" fill="#3E5BA3" stroke="#2C3E7F" stroke-width="8"/>
    <path d="M 450 200 Q 470 220 470 250 Q 470 280 450 300 Q 430 280 430 250 Q 430 220 450 200" fill="#3E5BA3" stroke="#2C3E7F" stroke-width="8"/>
  </g>
  
  <!-- Flower/Leaf Icon -->
  <g id="flower">
    <!-- Petal 1 (Top) -->
    <ellipse cx="500" cy="180" rx="35" ry="60" fill="#E8C89C" opacity="0.8"/>
    <!-- Petal 2 (Top Right) -->
    <ellipse cx="540" cy="210" rx="35" ry="60" fill="#D4A574" opacity="0.8" transform="rotate(60 540 210)"/>
    <!-- Petal 3 (Bottom Right) -->
    <ellipse cx="540" cy="290" rx="35" ry="60" fill="#B8A0D4" opacity="0.8" transform="rotate(120 540 290)"/>
    <!-- Petal 4 (Bottom) -->
    <ellipse cx="500" cy="320" rx="35" ry="60" fill="#9B8FD4" opacity="0.8" transform="rotate(180 500 320)"/>
    <!-- Petal 5 (Bottom Left) -->
    <ellipse cx="460" cy="290" rx="35" ry="60" fill="#7B7FD4" opacity="0.8" transform="rotate(240 460 290)"/>
    <!-- Petal 6 (Top Left) -->
    <ellipse cx="460" cy="210" rx="35" ry="60" fill="#5D6DD4" opacity="0.8" transform="rotate(300 460 210)"/>
    <!-- Center -->
    <circle cx="500" cy="250" r="20" fill="#E8C89C"/>
  </g>
  
  <!-- Wave underneath -->
  <path d="M 300 350 Q 350 330 400 350 Q 450 370 500 350 Q 550 330 600 350" stroke="#6B8FD4" stroke-width="15" fill="none" stroke-linecap="round"/>
  
  <!-- Text: MANNOSAAR -->
  <text x="400" y="500" font-family="Georgia, serif" font-size="120" font-weight="bold" text-anchor="middle" fill="#2C3E7F" letter-spacing="8">MANNOSAAR</text>
  
  <!-- Tagline: Heal • Grow • Transform -->
  <text x="400" y="580" font-family="Georgia, serif" font-size="48" text-anchor="middle" fill="#4A5F7F" letter-spacing="4">Heal • Grow • Transform</text>
</svg>